    <line x1="78" y1="16" x2="98" y2="28"/>
    <line x1="98" y1="28" x2="108" y2="52"/>
    <line x1="108" y1="52" x2="98" y2="78"/>
    <line x1="98" y1="78" x2="78" y2="96"/>
    <line x1="78" y1="96" x2="60" y2="88"/>
    <line x1="60" y1="28" x2="82" y2="48"/>
    <line x1="82" y1="48" x2="108" y2="52"/>
    <line x1="82" y1="48" x2="92" y2="68"/>
    <line x1="92" y1="68" x2="98" y2="78"/>
    <line x1="60" y1="58" x2="82" y2="48"/>
    <line x1="60" y1="58" x2="92" y2="68"/>
    <line x1="60" y1="88" x2="92" y2="68"/>
    <line x1="60" y1="28" x2="60" y2="58"/>
    <line x1="60" y1="58" x2="60" y2="88"/>
    <line x1="78" y1="16" x2="82" y2="48"/>
