  <circle cx="78" cy="16" r="5.5" fill="#ec4899"/>
  <circle cx="98" cy="28" r="4.5" fill="#f97316"/>
  <circle cx="108" cy="52" r="6.5" fill="#06b6d4"/>
  <circle cx="98" cy="78" r="4.5" fill="#f59e0b"/>
  <circle cx="78" cy="96" r="5.5" fill="#ef4444"/>
  <circle cx="60" cy="28" r="3.5" fill="#a855f7"/>
  <circle cx="60" cy="58" r="4" fill="#22d3ee"/>
  <circle cx="60" cy="88" r="3.5" fill="#ec4899"/>
  <circle cx="82" cy="48" r="3.5" fill="#f97316"/>
