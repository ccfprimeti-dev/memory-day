<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <clipPath id="left"><rect x="0" y="0" width="61" height="120"/></clipPath>
    <radialGradient id="brainGrad" cx="40%" cy="50%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
  </defs>

  <!-- Brain shape (left half) -->
  <g clip-path="url(#left)">
    <path d="M60,12 C47,12 36,20 32,31 C26,33 20,40 22,50 C18,55 18,65 22,70 C20,78 25,88 33,91 C37,99 46,107 56,108 C58,108 60,108 60,108 L60,12Z" fill="url(#brainGrad)"/>
    <path d="M38,32 C42,27 48,26 51,30" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
    <path d="M30,50 C33,44 40,42 44,46" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
    <path d="M28,65 C32,59 39,58 43,62" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
    <path d="M34,80 C39,74 46,73 49,77" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
    <path d="M24,40 C29,36 35,37 37,42" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.4"/>
  </g>

